<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Student Helping AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #08090d;
      --bg2: #0f1118;
      --bg3: #161922;
      --surface: rgba(255,255,255,0.04);
      --surface2: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #eef0f8;
      --text2: #8b90a8;
      --text3: #555a72;
      --accent: #e91e8c;
      --accent2: #ff6eb4;
      --accent3: #f0a500;
      --error: #f87171;
      --success: #4ade80;
      --grad: linear-gradient(135deg, #e91e8c 0%, #ff6eb4 50%, #f0a500 100%);
      --grad2: linear-gradient(135deg, #e91e8c22 0%, #ff6eb422 100%);
      --shadow: 0 24px 64px rgba(0,0,0,0.5);
      --radius: 18px;
      --transition: all 0.28s cubic-bezier(0.4,0,0.2,1);
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }
    [data-theme="light"] {
      --bg: #f4f5fb;
      --bg2: #ffffff;
      --bg3: #eceef8;
      --surface: rgba(233,30,140,0.04);
      --surface2: rgba(233,30,140,0.08);
      --border: rgba(233,30,140,0.12);
      --border2: rgba(233,30,140,0.22);
      --text: #16172b;
      --text2: #5a5e7a;
      --text3: #9499b8;
      --shadow: 0 24px 64px rgba(233,30,140,0.12);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      transition: background 0.3s, color 0.3s;
      position: relative; overflow: hidden;
    }
    /* Background ambient blobs */
    body::before {
      content: '';
      position: fixed; top: -30%; left: -20%;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(233,30,140,0.15) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
      animation: drift 8s ease-in-out infinite alternate;
    }
    body::after {
      content: '';
      position: fixed; bottom: -20%; right: -10%;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(56,189,248,0.1) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
      animation: drift 10s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.1); }
    }

    /* Nav */
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 40px;
    }
    .nav-logo {
      font-family: var(--font-display); font-weight: 800; font-size: 18px;
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; color: var(--text);
    }
    .logo-icon {
      width: 32px; height: 32px; border-radius: 9px;
      background: var(--grad);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }
    .theme-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border2);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 16px; transition: var(--transition); color: var(--text);
    }

    /* Card */
    .auth-card {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%; max-width: 460px;
      box-shadow: var(--shadow);
      position: relative; z-index: 1;
      animation: cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card-header { text-align: center; margin-bottom: 36px; }
    .card-icon {
      width: 64px; height: 64px; border-radius: 18px;
      background: var(--grad);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; margin: 0 auto 20px;
      box-shadow: 0 8px 32px rgba(233,30,140,0.3);
    }
    .card-header h1 {
      font-family: var(--font-display); font-weight: 800; font-size: 28px;
      letter-spacing: -0.02em; margin-bottom: 8px;
    }
    .card-header p { color: var(--text2); font-size: 15px; }

    /* Form */
    .form-group { margin-bottom: 20px; position: relative; }
    .form-label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--text2); margin-bottom: 8px;
      transition: color 0.2s;
    }
    .form-input {
      width: 100%; padding: 14px 18px;
      background: var(--surface);
      border: 1.5px solid var(--border2);
      border-radius: 12px;
      color: var(--text); font-family: var(--font-body); font-size: 15px;
      outline: none; transition: var(--transition);
    }
    .form-input::placeholder { color: var(--text3); }
    .form-input:focus {
      border-color: var(--accent);
      background: var(--surface2);
      box-shadow: 0 0 0 4px rgba(233,30,140,0.12);
    }
    .form-input.has-icon { padding-right: 50px; }
    .form-input.error { border-color: var(--error); }
    .form-input.success { border-color: var(--success); }
    .input-icon {
      position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
      cursor: pointer; color: var(--text3); font-size: 16px;
      transition: color 0.2s; user-select: none;
    }
    .input-icon:hover { color: var(--text2); }
    .input-icon-wrap { position: relative; }
    .error-msg {
      font-size: 12px; color: var(--error);
      margin-top: 6px; display: none;
    }
    .error-msg.show { display: block; }

    /* Checkbox */
    .form-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px;
    }
    .checkbox-label {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; font-size: 14px; color: var(--text2);
    }
    .checkbox-label input { display: none; }
    .custom-checkbox {
      width: 18px; height: 18px; border-radius: 5px;
      border: 1.5px solid var(--border2);
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition); flex-shrink: 0;
    }
    .checkbox-label input:checked + .custom-checkbox {
      background: var(--accent); border-color: var(--accent);
    }
    .checkbox-label input:checked + .custom-checkbox::after {
      content: '✓'; color: white; font-size: 11px; font-weight: 700;
    }
    .forgot-link {
      font-size: 13px; color: var(--accent2); text-decoration: none;
      transition: color 0.2s;
    }
    .forgot-link:hover { color: var(--accent); }

    /* Button */
    .btn-submit {
      width: 100%; padding: 15px;
      background: var(--grad);
      border: none; border-radius: 12px;
      color: white; font-family: var(--font-display);
      font-weight: 700; font-size: 16px;
      cursor: pointer; transition: var(--transition);
      position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(233,30,140,0.4); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit.loading { pointer-events: none; }
    .btn-submit .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0; color: var(--text3); font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* OAuth buttons */
    .oauth-btn {
      width: 100%; padding: 13px;
      background: var(--surface); border: 1.5px solid var(--border2);
      border-radius: 12px; color: var(--text);
      font-family: var(--font-body); font-size: 14px; font-weight: 500;
      cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-bottom: 12px;
    }
    .oauth-btn:hover { background: var(--surface2); border-color: var(--accent); }

    /* Footer link */
    .card-footer { text-align: center; margin-top: 24px; font-size: 14px; color: var(--text2); }
    .card-footer a { color: var(--accent2); font-weight: 600; }
    .card-footer a:hover { color: var(--accent); }

    @media (max-width: 520px) {
      .auth-card { padding: 32px 24px; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon">✦</div>
      Student AI
    </a>
    <button class="theme-btn" id="themeToggle">🌙</button>
  </div>

  <div class="auth-card">
    <div class="card-header">
      <div class="card-icon">✦</div>
      <h1>Welcome back</h1>
      <p>Sign in to continue your learning journey</p>
    </div>

    <form id="loginForm" novalidate>
      <!-- Email -->
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-icon-wrap">
          <input
            type="email" id="email" name="email"
            class="form-input has-icon"
            placeholder="you@example.com"
            autocomplete="email"
          />
          <span class="input-icon" id="emailIcon">✉️</span>
        </div>
        <div class="error-msg" id="emailError">Please enter a valid email address.</div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-icon-wrap">
          <input
            type="password" id="password" name="password"
            class="form-input has-icon"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
          <span class="input-icon" id="passwordToggle" title="Toggle visibility">👁️</span>
        </div>
        <div class="error-msg" id="passwordError">Password must be at least 6 characters.</div>
      </div>

      <!-- Remember + Forgot -->
      <div class="form-row">
        <label class="checkbox-label">
          <input type="checkbox" id="rememberMe"/>
          <span class="custom-checkbox"></span>
          Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-submit" id="submitBtn">
        <span class="btn-text">Sign In →</span>
        <div class="spinner"></div>
      </button>

      <div class="divider">or continue with</div>

      <button type="button" class="oauth-btn" onclick="demoLogin()">
        🎓 Continue as Demo Student
      </button>
    </form>

    <div class="card-footer">
      Don't have an account? <a href="signup.html">Sign up free</a>
    </div>
  </div>

<script>
  // ============================================================
  // THEME
  // ============================================================
  const themeToggle = document.getElementById('themeToggle');
  const savedTheme = localStorage.getItem('sha-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
  themeToggle.textContent = savedTheme === 'dark' ? '🌙' : '☀️';
  themeToggle.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('sha-theme', next);
    themeToggle.textContent = next === 'dark' ? '🌙' : '☀️';
  });

  // ============================================================
  // PASSWORD TOGGLE
  // ============================================================
  const passwordInput = document.getElementById('password');
  const passwordToggle = document.getElementById('passwordToggle');
  let passwordVisible = false;
  passwordToggle.addEventListener('click', () => {
    passwordVisible = !passwordVisible;
    passwordInput.type = passwordVisible ? 'text' : 'password';
    passwordToggle.textContent = passwordVisible ? '🙈' : '👁️';
  });

  // ============================================================
  // VALIDATION HELPERS
  // ============================================================
  function showError(inputId, errorId) {
    document.getElementById(inputId).classList.add('error');
    document.getElementById(errorId).classList.add('show');
  }
  function clearError(inputId, errorId) {
    document.getElementById(inputId).classList.remove('error');
    document.getElementById(errorId).classList.remove('show');
  }
  function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  // ============================================================
  // LIVE VALIDATION
  // ============================================================
  document.getElementById('email').addEventListener('input', function() {
    if (this.value && !isValidEmail(this.value)) {
      showError('email', 'emailError');
    } else {
      clearError('email', 'emailError');
    }
  });
  document.getElementById('password').addEventListener('input', function() {
    if (this.value.length > 0 && this.value.length < 6) {
      showError('password', 'passwordError');
    } else {
      clearError('password', 'passwordError');
    }
  });

  // ============================================================
  // FORM SUBMISSION
  // ============================================================
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    let valid = true;

    // Validate email
    if (!email || !isValidEmail(email)) {
      showError('email', 'emailError');
      valid = false;
    } else {
      clearError('email', 'emailError');
    }
    // Validate password
    if (!password || password.length < 6) {
      showError('password', 'passwordError');
      valid = false;
    } else {
      clearError('password', 'passwordError');
    }

    if (!valid) return;

    // Simulate API login
    const btn = document.getElementById('submitBtn');
    btn.classList.add('loading');

    setTimeout(() => {
      // Check if user exists in localStorage (from signup)
      const users = JSON.parse(localStorage.getItem('sha-users') || '[]');
      const user = users.find(u => u.email === email && u.password === password);

      if (user) {
        // Store session
        localStorage.setItem('sha-current-user', JSON.stringify({
          name: user.name, email: user.email, avatar: user.name[0].toUpperCase()
        }));
        if (document.getElementById('rememberMe').checked) {
          localStorage.setItem('sha-remember', 'true');
        }
        window.location.href = 'dashboard.html';
      } else {
        // Check demo account
        if (email === 'demo@student.ai' && password === 'demo123') {
          saveAndRedirect('Demo Student', email);
        } else {
          btn.classList.remove('loading');
          showError('email', 'emailError');
          document.getElementById('emailError').textContent = 'Invalid email or password.';
          showError('password', 'passwordError');
          document.getElementById('passwordError').textContent = 'Invalid email or password.';
        }
      }
    }, 1200);
  });

  // ============================================================
  // DEMO LOGIN
  // ============================================================
  function demoLogin() {
    saveAndRedirect('Demo Student', 'demo@student.ai');
  }

  function saveAndRedirect(name, email) {
    localStorage.setItem('sha-current-user', JSON.stringify({
      name: name, email: email, avatar: name[0].toUpperCase()
    }));
    window.location.href = 'dashboard.html';
  }
</script>
</body>
</html>
